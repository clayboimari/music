<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#ffffff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Meta" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <title>Meta</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    html, body {
      height: 100%; width: 100%;
      background: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .app {
      display: flex; flex-direction: column;
      height: 100%; width: 100%;
      max-width: 430px; margin: 0 auto;
      position: relative; overflow: hidden;
      padding-top: var(--safe-top);
    }
    .view { display: none; flex: 1; flex-direction: column; overflow: hidden; }
    .view.active { display: flex; }

    /* LOGIN */
    .login-view { align-items: center; justify-content: center; gap: 20px; padding: 40px 32px; }
    .login-logo { font-size: 48px; color: #ddd; }
    .login-title { font-size: 22px; font-weight: 500; color: #111; letter-spacing: -0.3px; }
    .login-sub { font-size: 13px; color: #aaa; text-align: center; line-height: 1.6; }
    .login-btn {
      margin-top: 8px; padding: 14px 40px;
      background: #111; color: #fff; border: none; border-radius: 100px;
      font-size: 14px; font-weight: 500; cursor: pointer;
    }

    /* PLAYER */
    .player-view { justify-content: space-between; }
    .main-content {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 0 24px; overflow: hidden;
    }
    .idle-prompt { display: flex; flex-direction: column; align-items: center; gap: 12px; }
    .idle-prompt i { font-size: 44px; color: #ddd; }
    .idle-prompt span { font-size: 13px; color: #bbb; }

    .album-wrap { width: min(280px, 72vw); height: min(280px, 72vw); cursor: pointer; flex-shrink: 0; display: none; }
    .album-cover { width: 100%; height: 100%; border-radius: 16px; overflow: hidden; position: relative; transition: transform 0.2s; }
    .album-wrap:active .album-cover { transform: scale(0.97); }
    .album-art-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
    .album-fallback {
      position: absolute; inset: 0;
      background: linear-gradient(135deg, #1a1a2e 0%, #0f3460 60%, #533483 100%);
      display: flex; align-items: center; justify-content: center;
    }
    .album-fallback i { font-size: 48px; color: rgba(255,255,255,0.2); }

    .song-info { width: 100%; margin-top: 28px; display: none; align-items: center; justify-content: space-between; }
    .song-title { font-size: 20px; font-weight: 500; color: #111; letter-spacing: -0.3px; }
    .song-artist { font-size: 14px; color: #888; margin-top: 4px; }
    .heart-btn { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #ccc; transition: color 0.2s; flex-shrink: 0; }
    .heart-btn.liked { color: #111; }

    .progress-section { width: 100%; margin-top: 24px; display: none; }
    .progress-track { width: 100%; height: 2px; background: #e8e8e8; border-radius: 2px; cursor: pointer; }
    .progress-fill { height: 100%; background: #111; border-radius: 2px; width: 0%; position: relative; pointer-events: none; }
    .progress-thumb { width: 10px; height: 10px; border-radius: 50%; background: #111; position: absolute; right: -5px; top: 50%; transform: translateY(-50%); }
    .time-row { display: flex; justify-content: space-between; margin-top: 8px; }
    .time-label { font-size: 11px; color: #bbb; font-variant-numeric: tabular-nums; }

    .controls { width: 100%; margin-top: 24px; padding: 0 4px; display: none; align-items: center; justify-content: space-between; }
    .ctrl-btn { width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #bbb; border-radius: 50%; transition: color 0.15s; }
    .ctrl-btn.active { color: #111; }
    .play-btn { width: 64px; height: 64px; border-radius: 50%; background: #111; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #fff; transition: transform 0.15s; flex-shrink: 0; }
    .play-btn:active { transform: scale(0.95); }

    /* SEARCH */
    .search-view { padding: 16px 0 0; }
    .search-header { padding: 0 20px 12px; flex-shrink: 0; }
    .search-input-wrap { display: flex; align-items: center; gap: 10px; background: #f5f5f5; border-radius: 12px; padding: 10px 14px; }
    .search-input-wrap i { color: #aaa; font-size: 18px; flex-shrink: 0; }
    .search-input { flex: 1; border: none; background: transparent; font-size: 15px; color: #111; outline: none; font-family: inherit; }
    .search-input::placeholder { color: #bbb; }
    .search-clear { color: #bbb; cursor: pointer; font-size: 16px; display: none; }
    .search-results { flex: 1; overflow-y: auto; padding: 0 20px; }
    .result-item { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 0.5px solid #f0f0f0; cursor: pointer; transition: opacity 0.15s; }
    .result-item:active { opacity: 0.6; }
    .result-item:last-child { border-bottom: none; }
    .result-art { width: 48px; height: 48px; border-radius: 6px; object-fit: cover; background: #eee; flex-shrink: 0; }
    .result-art-fallback { width: 48px; height: 48px; border-radius: 6px; background: #f0f0f0; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .result-art-fallback i { color: #ccc; font-size: 20px; }
    .result-text { flex: 1; min-width: 0; }
    .result-title { font-size: 14px; font-weight: 500; color: #111; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .result-artist { font-size: 12px; color: #888; margin-top: 2px; }
    .result-duration { font-size: 11px; color: #ccc; flex-shrink: 0; }
    .search-empty { display: flex; flex-direction: column; align-items: center; gap: 12px; padding: 60px 0; }
    .search-empty i { font-size: 36px; color: #e0e0e0; }
    .search-empty span { font-size: 13px; color: #bbb; }

    /* MINI PLAYER */
    .mini-player { display: none; align-items: center; gap: 12px; padding: 10px 20px; border-bottom: 0.5px solid #f0f0f0; flex-shrink: 0; }
    .mini-player.visible { display: flex; }
    .mini-art { width: 36px; height: 36px; border-radius: 6px; object-fit: cover; background: #eee; flex-shrink: 0; }
    .mini-info { flex: 1; min-width: 0; }
    .mini-title { font-size: 13px; font-weight: 500; color: #111; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .mini-artist { font-size: 11px; color: #888; }
    .mini-play { width: 32px; height: 32px; border-radius: 50%; background: #111; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #fff; flex-shrink: 0; }

    /* NAV */
    .separator { height: 0.5px; background: #e8e8e8; margin: 0 24px; flex-shrink: 0; }
    .bottom-nav { display: flex; justify-content: space-around; padding: 12px 8px calc(var(--safe-bottom) + 14px); flex-shrink: 0; }
    .nav-item { display: flex; flex-direction: column; align-items: center; gap: 3px; cursor: pointer; color: #ccc; padding: 4px 12px; border-radius: 8px; transition: color 0.15s; }
    .nav-item.active { color: #111; }
    .nav-item span { font-size: 10px; font-weight: 500; }
    .nav-item i { font-size: 20px; }

    /* TOAST */
    .toast { position: absolute; bottom: 100px; left: 50%; transform: translateX(-50%); background: #111; color: #fff; padding: 8px 18px; border-radius: 100px; font-size: 12px; white-space: nowrap; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 20; }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>
<div class="app">

  <!-- LOGIN -->
  <div class="view login-view active" id="loginView">
    <i class="ti ti-music login-logo"></i>
    <div class="login-title">Meta</div>
    <div class="login-sub">Connect your Spotify Premium account to search and play any track.</div>
    <button class="login-btn" onclick="spotifyLogin()">Connect Spotify</button>
  </div>

  <!-- PLAYER -->
  <div class="view player-view" id="playerView">
    <div class="main-content">
      <div class="idle-prompt" id="idlePrompt">
        <i class="ti ti-search"></i>
        <span>Search for a track to play</span>
      </div>
      <div class="album-wrap" id="albumWrap">
        <div class="album-cover">
          <img class="album-art-img" id="albumArtImg" />
          <div class="album-fallback" id="albumFallback"><i class="ti ti-music"></i></div>
        </div>
      </div>
      <div class="song-info" id="songInfo">
        <div style="min-width:0;flex:1">
          <div class="song-title" id="songTitle">—</div>
          <div class="song-artist" id="songArtist">—</div>
        </div>
        <div class="heart-btn" id="heartBtn" onclick="toggleLike()">
          <i class="ti ti-heart" style="font-size:20px" id="heartIcon"></i>
        </div>
      </div>
      <div class="progress-section" id="progressSection">
        <div class="progress-track" id="progressTrack">
          <div class="progress-fill" id="progressFill"><div class="progress-thumb"></div></div>
        </div>
        <div class="time-row">
          <span class="time-label" id="currentTime">0:00</span>
          <span class="time-label" id="totalTime">0:00</span>
        </div>
      </div>
      <div class="controls" id="controls">
        <div class="ctrl-btn" id="shuffleBtn" onclick="toggleShuffle()"><i class="ti ti-arrows-shuffle" style="font-size:18px"></i></div>
        <div class="ctrl-btn" onclick="skipPrev()"><i class="ti ti-player-skip-back-filled" style="font-size:22px"></i></div>
        <div class="play-btn" onclick="togglePlay()"><i style="font-size:26px" id="playIcon" class="ti ti-player-play-filled"></i></div>
        <div class="ctrl-btn" onclick="skipNext()"><i class="ti ti-player-skip-forward-filled" style="font-size:22px"></i></div>
        <div class="ctrl-btn" id="repeatBtn" onclick="toggleRepeat()"><i class="ti ti-repeat" style="font-size:18px"></i></div>
      </div>
    </div>
    <div class="separator"></div>
    <nav class="bottom-nav">
      <div class="nav-item active" onclick="showView('player')"><i class="ti ti-disc"></i><span>Now</span></div>
      <div class="nav-item" onclick="showView('search')"><i class="ti ti-search"></i><span>Search</span></div>
      <div class="nav-item"><i class="ti ti-library"></i><span>Library</span></div>
    </nav>
  </div>

  <!-- SEARCH -->
  <div class="view search-view" id="searchView">
    <div class="mini-player" id="miniPlayer">
      <img class="mini-art" id="miniArt" />
      <div class="mini-info">
        <div class="mini-title" id="miniTitle">—</div>
        <div class="mini-artist" id="miniArtist">—</div>
      </div>
      <div class="mini-play" onclick="togglePlay()"><i style="font-size:14px" id="miniPlayIcon" class="ti ti-player-play-filled"></i></div>
    </div>
    <div class="search-header">
      <div class="search-input-wrap">
        <i class="ti ti-search"></i>
        <input class="search-input" id="searchInput" type="search" placeholder="Artists, songs, albums…" autocomplete="off" />
        <i class="ti ti-x search-clear" id="searchClear" onclick="clearSearch()"></i>
      </div>
    </div>
    <div class="search-results" id="searchResults">
      <div class="search-empty"><i class="ti ti-music"></i><span>Start typing to search</span></div>
    </div>
    <div class="separator"></div>
    <nav class="bottom-nav">
      <div class="nav-item" onclick="showView('player')"><i class="ti ti-disc"></i><span>Now</span></div>
      <div class="nav-item active" onclick="showView('search')"><i class="ti ti-search"></i><span>Search</span></div>
      <div class="nav-item"><i class="ti ti-library"></i><span>Library</span></div>
    </nav>
  </div>

  <div class="toast" id="toast"></div>
</div>

<script src="https://sdk.scdn.co/spotify-player.js"></script>
<script>

const CLIENT_ID = '215327a51f2145f4a299b26a24cd2376';
const REDIRECT_URI = 'https://clayboimari.github.io/music/';
const SCOPES = 'streaming user-read-email user-read-private user-read-playback-state user-modify-playback-state';

let accessToken = null;
let player = null;
let deviceId = null;
let isPlaying = false;
let liked = false;
let shuffleOn = false;
let repeatOn = false;
let progressInterval = null;
let trackDurationMs = 0;
let trackPositionMs = 0;

// Store search results here — never in HTML attributes
let trackCache = [];

// ── PKCE ──
function generateVerifier() {
  const arr = new Uint8Array(64);
  crypto.getRandomValues(arr);
  return btoa(String.fromCharCode(...arr)).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
}

async function generateChallenge(verifier) {
  const data = new TextEncoder().encode(verifier);
  const digest = await crypto.subtle.digest('SHA-256', data);
  return btoa(String.fromCharCode(...new Uint8Array(digest))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
}

async function spotifyLogin() {
  const verifier = generateVerifier();
  const challenge = await generateChallenge(verifier);
  sessionStorage.setItem('pkce_verifier', verifier);
  const params = new URLSearchParams({
    client_id: CLIENT_ID,
    response_type: 'code',
    redirect_uri: REDIRECT_URI,
    scope: SCOPES,
    code_challenge_method: 'S256',
    code_challenge: challenge,
  });
  window.location.href = 'https://accounts.spotify.com/authorize?' + params;
}

let exchangeInProgress = false;

async function exchangeCode(code) {
  if (exchangeInProgress) { console.log("exchange already in progress, skipping"); return; }
  exchangeInProgress = true;
  const verifier = sessionStorage.getItem("pkce_verifier");
  console.log("exchangeCode: code=" + (code ? code.slice(0,10)+"..." : "MISSING"));
  console.log("exchangeCode: verifier=" + (verifier ? verifier.slice(0,10)+"..." : "MISSING"));
  sessionStorage.removeItem("pkce_verifier");
  const res = await fetch("https://accounts.spotify.com/api/token", {
    method: "POST",
    headers: { "Content-Type": "application/x-www-form-urlencoded" },
    body: new URLSearchParams({
      client_id: CLIENT_ID,
      grant_type: "authorization_code",
      code,
      redirect_uri: REDIRECT_URI,
      code_verifier: verifier,
    })
  });
  const data = await res.json();
  console.log("exchangeCode response:", JSON.stringify(data).slice(0, 200));
  if (data.access_token) {
    accessToken = data.access_token;
    localStorage.setItem("spotify_token", data.access_token);
    localStorage.setItem("spotify_refresh", data.refresh_token);
    localStorage.setItem("spotify_expiry", Date.now() + data.expires_in * 1000);
    window.history.replaceState({}, "", REDIRECT_URI);
    initApp();
  } else {
    console.error("Token exchange failed:", data);
    exchangeInProgress = false;
  }
}

async function refreshToken() {
  const refresh = localStorage.getItem('spotify_refresh');
  if (!refresh) return false;
  const res = await fetch('https://accounts.spotify.com/api/token', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: new URLSearchParams({
      client_id: CLIENT_ID,
      grant_type: 'refresh_token',
      refresh_token: refresh,
    })
  });
  const data = await res.json();
  if (data.access_token) {
    accessToken = data.access_token;
    localStorage.setItem('spotify_token', data.access_token);
    localStorage.setItem('spotify_expiry', Date.now() + data.expires_in * 1000);
    return true;
  }
  return false;
}

async function getToken() {
  const expiry = Number(localStorage.getItem('spotify_expiry'));
  if (expiry && Date.now() > expiry - 60000) await refreshToken();
  return accessToken || localStorage.getItem('spotify_token');
}

// ── SDK ──
window.onSpotifyWebPlaybackSDKReady = () => {
  player = new Spotify.Player({
    name: 'Meta',
    getOAuthToken: async cb => { cb(await getToken()); },
    volume: 0.8
  });
  player.addListener('ready', ({ device_id }) => {
    deviceId = device_id;
    showToast('Spotify connected');
  });
  player.addListener('player_state_changed', state => {
    if (!state) return;
    isPlaying = !state.paused;
    trackDurationMs = state.duration;
    trackPositionMs = state.position;
    updatePlayIcons();
    startProgressTracking();
  });
  player.addListener('authentication_error', () => logout());
  player.connect();
};

function initApp() {
  document.getElementById('loginView').classList.remove('active');
  document.getElementById('playerView').classList.add('active');
}

// ── PLAYBACK ──
async function playTrack(uri, track) {
  const token = await getToken();
  if (!deviceId) { showToast('Player not ready yet'); return; }
  await fetch('https://api.spotify.com/v1/me/player/play?device_id=' + deviceId, {
    method: 'PUT',
    headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
    body: JSON.stringify({ uris: [uri] })
  });
  updateTrackUI(track);
  showView('player');
}

function updateTrackUI(track) {
  const title = track.name || '—';
  const artist = track.artists ? track.artists.map(a => a.name).join(', ') : '—';
  const art = track.album?.images?.[0]?.url || null;

  document.getElementById('songTitle').textContent = title;
  document.getElementById('songArtist').textContent = artist;
  document.getElementById('miniTitle').textContent = title;
  document.getElementById('miniArtist').textContent = artist;

  if (art) {
    document.getElementById('albumArtImg').src = art;
    document.getElementById('albumArtImg').style.display = 'block';
    document.getElementById('albumFallback').style.display = 'none';
    document.getElementById('miniArt').src = art;
  } else {
    document.getElementById('albumArtImg').style.display = 'none';
    document.getElementById('albumFallback').style.display = 'flex';
  }

  document.getElementById('idlePrompt').style.display = 'none';
  document.getElementById('albumWrap').style.display = 'block';
  document.getElementById('songInfo').style.display = 'flex';
  document.getElementById('progressSection').style.display = 'block';
  document.getElementById('controls').style.display = 'flex';
  document.getElementById('miniPlayer').classList.add('visible');
}

function updatePlayIcons() {
  const cls = isPlaying ? 'ti ti-player-pause-filled' : 'ti ti-player-play-filled';
  document.getElementById('playIcon').className = cls;
  document.getElementById('miniPlayIcon').className = cls;
}

function startProgressTracking() {
  clearInterval(progressInterval);
  if (!isPlaying) return;
  const startTime = Date.now();
  const startPos = trackPositionMs;
  progressInterval = setInterval(() => {
    const elapsed = startPos + (Date.now() - startTime);
    const pct = Math.min((elapsed / trackDurationMs) * 100, 100);
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('currentTime').textContent = fmt(elapsed / 1000);
    document.getElementById('totalTime').textContent = fmt(trackDurationMs / 1000);
  }, 500);
}

function fmt(s) {
  if (!s || isNaN(s)) return '0:00';
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return m + ':' + (sec < 10 ? '0' : '') + sec;
}

async function togglePlay() { if (player) await player.togglePlay(); }
async function skipNext() { if (player) await player.nextTrack(); }
async function skipPrev() {
  if (!player) return;
  const state = await player.getCurrentState();
  if (state && state.position > 3000) player.seek(0);
  else player.previousTrack();
}
function toggleShuffle() {
  shuffleOn = !shuffleOn;
  document.getElementById('shuffleBtn').className = shuffleOn ? 'ctrl-btn active' : 'ctrl-btn';
}
function toggleRepeat() {
  repeatOn = !repeatOn;
  document.getElementById('repeatBtn').className = repeatOn ? 'ctrl-btn active' : 'ctrl-btn';
}
function toggleLike() {
  liked = !liked;
  document.getElementById('heartBtn').className = liked ? 'heart-btn liked' : 'heart-btn';
  document.getElementById('heartIcon').className = liked ? 'ti ti-heart-filled' : 'ti ti-heart';
}

document.getElementById('progressTrack').addEventListener('click', async e => {
  if (!player || !trackDurationMs) return;
  const rect = e.currentTarget.getBoundingClientRect();
  await player.seek(Math.floor(((e.clientX - rect.left) / rect.width) * trackDurationMs));
});

// ── SEARCH ──
let searchTimer = null;

document.getElementById('searchInput').addEventListener('input', e => {
  const q = e.target.value.trim();
  document.getElementById('searchClear').style.display = q ? 'block' : 'none';
  clearTimeout(searchTimer);
  if (!q) { showEmptySearch('Start typing to search'); return; }
  searchTimer = setTimeout(() => doSearch(q), 400);
});

function clearSearch() {
  document.getElementById('searchInput').value = '';
  document.getElementById('searchClear').style.display = 'none';
  showEmptySearch('Start typing to search');
  document.getElementById('searchInput').focus();
}

function showEmptySearch(msg) {
  document.getElementById('searchResults').innerHTML =
    '<div class="search-empty"><i class="ti ti-music"></i><span>' + msg + '</span></div>';
}

async function doSearch(q) {
  const token = await getToken();
  if (!token) return;
  showEmptySearch('Searching\u2026');
  try {
    const res = await fetch(
      'https://api.spotify.com/v1/search?q=' + encodeURIComponent(q) + '&type=track&limit=20',
      { headers: { 'Authorization': 'Bearer ' + token } }
    );
    const data = await res.json();
    const items = (data.tracks && data.tracks.items) ? data.tracks.items : [];
    renderResults(items);
  } catch(err) {
    showEmptySearch('Something went wrong');
    console.error(err);
  }
}

function renderResults(tracks) {
  if (!tracks.length) { showEmptySearch('No results'); return; }
  trackCache = tracks;
  var html = '';
  for (var i = 0; i < tracks.length; i++) {
    var t = tracks[i];
    var art = (t.album && t.album.images && t.album.images[1]) ? t.album.images[1].url : '';
    var artist = t.artists ? t.artists.map(function(a){ return a.name; }).join(', ') : '—';
    var dur = fmt(t.duration_ms / 1000);
    var artHtml = art
      ? '<img class="result-art" src="' + art + '" loading="lazy" />'
      : '<div class="result-art-fallback"><i class="ti ti-music"></i></div>';
    html += '<div class="result-item" onclick="playFromCache(' + i + ')">'
      + artHtml
      + '<div class="result-text">'
      + '<div class="result-title">' + escHtml(t.name) + '</div>'
      + '<div class="result-artist">' + escHtml(artist) + '</div>'
      + '</div>'
      + '<div class="result-duration">' + dur + '</div>'
      + '</div>';
  }
  document.getElementById('searchResults').innerHTML = html;
}

function playFromCache(i) {
  var t = trackCache[i];
  if (t) playTrack(t.uri, t);
}

function escHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

// ── VIEWS ──
function showView(name) {
  document.getElementById('playerView').classList.toggle('active', name === 'player');
  document.getElementById('searchView').classList.toggle('active', name === 'search');
  if (name === 'search') document.getElementById('searchInput').focus();
}

// ── TOAST ──
var toastTimer;
function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function(){ t.classList.remove('show'); }, 2500);
}

function logout() {
  localStorage.clear();
  accessToken = null;
  if (player) player.disconnect();
  document.getElementById('playerView').classList.remove('active');
  document.getElementById('searchView').classList.remove('active');
  document.getElementById('loginView').classList.add('active');
}

// ── BOOT ──
async function boot() {
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  if (code) {
    await exchangeCode(code);
    return;
  }
  const token = localStorage.getItem('spotify_token');
  const expiry = Number(localStorage.getItem('spotify_expiry'));
  if (token) {
    if (Date.now() > expiry - 60000) {
      const ok = await refreshToken();
      if (!ok) return;
    } else {
      accessToken = token;
    }
    initApp();
  }
}

boot();
</script>
