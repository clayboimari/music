<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#ffffff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Meta" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <title>Meta</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    html, body {
      height: 100%;
      width: 100%;
      background: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    .app {
      display: flex;
      flex-direction: column;
      height: 100%;
      width: 100%;
      max-width: 430px;
      margin: 0 auto;
      position: relative;
      overflow: hidden;
      padding-top: var(--safe-top);
    }

    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0 24px;
      overflow: hidden;
    }

    .album-wrap {
      position: relative;
      width: min(280px, 72vw);
      height: min(280px, 72vw);
      cursor: pointer;
      flex-shrink: 0;
    }

    .album-cover {
      width: 100%;
      height: 100%;
      border-radius: 16px;
      background: #111;
      position: relative;
      overflow: hidden;
      transition: transform 0.2s ease;
    }

    .album-wrap:active .album-cover { transform: scale(0.97); }

    .album-gradient {
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 40%, #0f3460 70%, #533483 100%);
    }

    .album-texture {
      position: absolute;
      inset: 0;
      opacity: 0.06;
      background-image:
        repeating-linear-gradient(0deg, #fff 0px, #fff 1px, transparent 1px, transparent 8px),
        repeating-linear-gradient(90deg, #fff 0px, #fff 1px, transparent 1px, transparent 8px);
    }

    .album-inner-ring {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 80px; height: 80px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.15);
    }

    .album-center-dot {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 14px; height: 14px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
    }

    .song-info {
      width: 100%;
      margin-top: 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .song-title {
      font-size: 20px;
      font-weight: 500;
      color: #111;
      letter-spacing: -0.3px;
      line-height: 1.2;
    }

    .song-artist {
      font-size: 14px;
      color: #888;
      margin-top: 4px;
    }

    .heart-btn {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: #ccc;
      transition: color 0.2s;
      flex-shrink: 0;
    }

    .heart-btn.liked { color: #111; }

    .progress-section { width: 100%; margin-top: 28px; }

    .progress-track {
      width: 100%;
      height: 2px;
      background: #e8e8e8;
      border-radius: 2px;
      position: relative;
      cursor: pointer;
    }

    .progress-fill {
      height: 100%;
      background: #111;
      border-radius: 2px;
      width: 0%;
      position: relative;
    }

    .progress-thumb {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #111;
      position: absolute;
      right: -5px; top: 50%;
      transform: translateY(-50%);
    }

    .time-row {
      display: flex;
      justify-content: space-between;
      margin-top: 8px;
    }

    .time-label {
      font-size: 11px;
      color: #bbb;
      font-variant-numeric: tabular-nums;
    }

    .controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      margin-top: 28px;
      padding: 0 4px;
    }

    .ctrl-btn {
      width: 44px; height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: #bbb;
      border-radius: 50%;
      transition: color 0.15s;
    }

    .ctrl-btn.active { color: #111; }

    .play-btn {
      width: 64px; height: 64px;
      border-radius: 50%;
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: #fff;
      transition: transform 0.15s;
      flex-shrink: 0;
    }

    .play-btn:active { transform: scale(0.95); }

    .separator { height: 0.5px; background: #e8e8e8; margin: 0 24px; flex-shrink: 0; }

    .bottom-nav {
      display: flex;
      justify-content: space-around;
      padding: 12px 8px calc(var(--safe-bottom) + 14px);
      flex-shrink: 0;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      cursor: pointer;
      color: #ccc;
      padding: 4px 12px;
      border-radius: 8px;
      transition: color 0.15s;
    }

    .nav-item.active { color: #111; }
    .nav-item span { font-size: 10px; font-weight: 500; }
    .nav-item i { font-size: 20px; }

    .credits-overlay {
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.97);
      padding: calc(var(--safe-top) + 60px) 28px 28px;
      display: none;
      flex-direction: column;
      z-index: 10;
    }

    .credits-overlay.visible { display: flex; }

    .credits-close {
      position: absolute;
      top: calc(var(--safe-top) + 20px);
      right: 24px;
      cursor: pointer;
      color: #888;
      font-size: 20px;
    }

    .credits-title {
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #999;
      font-weight: 500;
      margin-bottom: 20px;
    }

    .credit-row {
      display: flex;
      justify-content: space-between;
      padding: 14px 0;
      border-bottom: 0.5px solid #f0f0f0;
    }

    .credit-role { font-size: 12px; color: #aaa; }
    .credit-name { font-size: 13px; color: #111; font-weight: 500; }
  </style>
</head>
<body>
  <div class="app" id="app">

    <div class="main-content">

      <div class="album-wrap" id="albumWrap">
        <div class="album-cover">
          <div class="album-gradient"></div>
          <div class="album-texture"></div>
          <div class="album-inner-ring"></div>
          <div class="album-center-dot"></div>
        </div>
      </div>

      <div class="song-info">
        <div>
          <div class="song-title">Song Title</div>
          <div class="song-artist">Artist</div>
        </div>
        <div class="heart-btn" id="heartBtn">
          <i class="ti ti-heart" style="font-size:20px" id="heartIcon"></i>
        </div>
      </div>

      <div class="progress-section">
        <div class="progress-track" id="progressTrack">
          <div class="progress-fill" id="progressFill">
            <div class="progress-thumb"></div>
          </div>
        </div>
        <div class="time-row">
          <span class="time-label" id="currentTime">0:00</span>
          <span class="time-label" id="totalTime">0:00</span>
        </div>
      </div>

      <div class="controls">
        <div class="ctrl-btn" id="shuffleBtn" onclick="toggleShuffle()">
          <i class="ti ti-arrows-shuffle" style="font-size:18px"></i>
        </div>
        <div class="ctrl-btn" onclick="prevTrack()">
          <i class="ti ti-player-skip-back-filled" style="font-size:22px"></i>
        </div>
        <div class="play-btn" id="playBtn" onclick="togglePlay()">
          <i class="ti ti-player-play-filled" style="font-size:26px" id="playIcon"></i>
        </div>
        <div class="ctrl-btn" onclick="nextTrack()">
          <i class="ti ti-player-skip-forward-filled" style="font-size:22px"></i>
        </div>
        <div class="ctrl-btn" id="repeatBtn" onclick="toggleRepeat()">
          <i class="ti ti-repeat" style="font-size:18px"></i>
        </div>
      </div>

    </div>

    <div class="separator"></div>

    <nav class="bottom-nav">
      <div class="nav-item"><i class="ti ti-list"></i><span>Queue</span></div>
      <div class="nav-item active"><i class="ti ti-disc"></i><span>Now</span></div>
      <div class="nav-item"><i class="ti ti-search"></i><span>Search</span></div>
      <div class="nav-item"><i class="ti ti-library"></i><span>Library</span></div>
    </nav>

    <div class="credits-overlay" id="creditsOverlay">
      <div class="credits-close" onclick="closeCredits()">
        <i class="ti ti-x"></i>
      </div>
      <div class="credits-title">Credits</div>
      <div class="credit-row"><span class="credit-role">Artist</span><span class="credit-name">—</span></div>
      <div class="credit-row"><span class="credit-role">Label</span><span class="credit-name">—</span></div>
      <div class="credit-row"><span class="credit-role">Released</span><span class="credit-name">—</span></div>
    </div>

  </div>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }

    let playing = false, liked = false, shuffleOn = false, repeatOn = false;
    let holdTimer = null, progressInterval = null;
    let progressPct = 0;

    function togglePlay() {
      playing = !playing;
      document.getElementById('playIcon').className =
        playing ? 'ti ti-player-pause-filled' : 'ti ti-player-play-filled';
      if (playing) {
        progressInterval = setInterval(() => {
          progressPct = Math.min(progressPct + 0.05, 100);
          updateProgress();
        }, 100);
      } else {
        clearInterval(progressInterval);
      }
    }

    function updateProgress() {
      document.getElementById('progressFill').style.width = progressPct + '%';
    }

    function toggleLike() {
      liked = !liked;
      document.getElementById('heartBtn').className = liked ? 'heart-btn liked' : 'heart-btn';
      document.getElementById('heartIcon').className = liked ? 'ti ti-heart-filled' : 'ti ti-heart';
    }

    function toggleShuffle() {
      shuffleOn = !shuffleOn;
      document.getElementById('shuffleBtn').className = shuffleOn ? 'ctrl-btn active' : 'ctrl-btn';
    }

    function toggleRepeat() {
      repeatOn = !repeatOn;
      document.getElementById('repeatBtn').className = repeatOn ? 'ctrl-btn active' : 'ctrl-btn';
    }

    function prevTrack() { progressPct = 0; updateProgress(); }
    function nextTrack() { progressPct = 0; updateProgress(); }

    function closeCredits() {
      document.getElementById('creditsOverlay').className = 'credits-overlay';
    }

    document.getElementById('heartBtn').addEventListener('click', toggleLike);

    const albumWrap = document.getElementById('albumWrap');
    albumWrap.addEventListener('touchstart', () => {
      holdTimer = setTimeout(() => {
        document.getElementById('creditsOverlay').className = 'credits-overlay visible';
      }, 600);
    });
    albumWrap.addEventListener('touchend', () => clearTimeout(holdTimer));
    albumWrap.addEventListener('touchmove', () => clearTimeout(holdTimer));

    document.getElementById('progressTrack').addEventListener('click', e => {
      const rect = e.currentTarget.getBoundingClientRect();
      progressPct = Math.round(((e.clientX - rect.left) / rect.width) * 100);
      updateProgress();
    });
  </script>
</body>
</html>
